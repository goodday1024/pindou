<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>豆粒工坊 · 拼豆代拼接单</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Caveat:wght@400;600;700&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4ECD8;
  --paper-deep:#EADFC4;
  --paper-soft:#FBF6E8;
  --ink:#2B2118;
  --ink-soft:#5A4A3A;
  --ink-faint:#8A7860;
  --vermillion:#D94F3A;
  --vermillion-deep:#B23A28;
  --sage:#7A9E7E;
  --sage-deep:#5A7A5E;
  --gold:#E8B547;
  --plum:#6B4C7A;
  --bead:#C4956C;
  --line:#C9B896;
  --line-soft:#DBC9A6;
  --danger:#C0392B;
  --online:#5BAE6A;
  --shadow:0 1px 0 rgba(43,33,24,.06), 0 8px 24px -12px rgba(43,33,24,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Newsreader","Noto Serif SC",Georgia,serif;
  background:var(--paper);
  color:var(--ink);
  font-size:15px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(43,33,24,.06) 1px, transparent 0);
  background-size:18px 18px;
}
/* paper grain overlay */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(120% 80% at 100% 0%, rgba(217,79,58,.05), transparent 50%),
    radial-gradient(100% 70% at 0% 100%, rgba(122,158,110,.06), transparent 50%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .17 0 0 0 0 .13 0 0 0 0 .09 0 0 0 .05 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  opacity:.6;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}
a{color:var(--vermillion-deep)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;border:2px solid var(--paper)}
::-webkit-scrollbar-thumb:hover{background:var(--ink-faint)}

/* ---------- typography ---------- */
.pixel{font-family:"Silkscreen",monospace;letter-spacing:.5px;text-transform:uppercase}
.hand{font-family:"Caveat",cursive}
.display{font-family:"Silkscreen",monospace;letter-spacing:.02em}
h1,h2,h3{font-family:"Noto Serif SC","Newsreader",serif;font-weight:600;line-height:1.2}

/* ---------- layout ---------- */
#app{position:relative;z-index:1;min-height:100vh}

/* ---------- auth ---------- */
.auth-wrap{
  min-height:100vh;display:grid;grid-template-columns:1.1fr .9fr;
}
.auth-art{
  position:relative;overflow:hidden;
  background:
    linear-gradient(160deg,#3A2A1C 0%, #2B2118 60%, #1F1812 100%);
  color:var(--paper-soft);
  padding:56px 48px;display:flex;flex-direction:column;justify-content:space-between;
}
.auth-art::before{
  content:"";position:absolute;inset:0;
  background-image:
    radial-gradient(circle at 50% 50%, rgba(232,181,71,.10) 0, transparent 60%),
    radial-gradient(circle at 1px 1px, rgba(244,236,216,.07) 1px, transparent 0);
  background-size:auto, 22px 22px;
}
.auth-art .bead-mosaic{
  position:absolute;right:-40px;top:50%;transform:translateY(-50%);
  display:grid;grid-template-columns:repeat(8,18px);gap:4px;opacity:.5;
}
.auth-art .bead-mosaic span{width:18px;height:18px;border-radius:3px}
.auth-art .seal{
  width:96px;height:96px;border:3px solid var(--vermillion);
  border-radius:8px;display:grid;place-items:center;
  font-family:"Silkscreen",monospace;color:var(--vermillion);
  font-size:10px;text-align:center;line-height:1.3;
  transform:rotate(-8deg);
  box-shadow:0 0 0 6px rgba(217,79,58,.08);
  background:rgba(217,79,58,.04);
}
.auth-art h1{font-size:46px;line-height:1.05;color:var(--paper-soft);font-weight:700;letter-spacing:-.5px}
.auth-art h1 em{font-style:normal;color:var(--gold);font-family:"Caveat",cursive;font-size:1.1em;font-weight:700}
.auth-art .tag{font-family:"Silkscreen",monospace;font-size:11px;color:var(--gold);letter-spacing:2px;margin-bottom:18px}
.auth-art .foot{font-size:13px;color:rgba(244,236,216,.5);position:relative;z-index:2}
.auth-form{
  display:flex;align-items:center;justify-content:center;padding:48px 32px;
  background:var(--paper-soft);
}
.auth-card{width:100%;max-width:380px}
.auth-card .logo-row{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.auth-card .logo-row .mark{
  width:42px;height:42px;border-radius:8px;background:var(--ink);
  display:grid;place-items:center;color:var(--gold);font-family:"Silkscreen",monospace;font-size:14px;
}
.auth-card h2{font-size:24px;margin-bottom:6px}
.auth-card .sub{color:var(--ink-soft);font-size:14px;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-family:"Silkscreen",monospace;letter-spacing:1px;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase}
.field input,.field textarea,.field select{
  width:100%;padding:11px 13px;background:var(--paper);
  border:1.5px solid var(--line);border-radius:6px;outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--vermillion);box-shadow:0 0 0 3px rgba(217,79,58,.12)}
.field textarea{resize:vertical;min-height:80px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 18px;border-radius:6px;font-weight:500;font-size:14px;
  transition:transform .08s, box-shadow .15s, background .15s;
  border:1.5px solid transparent;
}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--ink);color:var(--paper-soft)}
.btn-primary:hover{background:#1F1812;box-shadow:0 4px 12px -4px rgba(43,33,24,.4)}
.btn-accent{background:var(--vermillion);color:#fff}
.btn-accent:hover{background:var(--vermillion-deep)}
.btn-ghost{background:transparent;border-color:var(--line);color:var(--ink)}
.btn-ghost:hover{background:var(--paper-deep)}
.btn-sage{background:var(--sage);color:#fff}
.btn-sage:hover{background:var(--sage-deep)}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-gold:hover{background:#D9A435}
.btn-block{width:100%}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-sm{padding:7px 12px;font-size:13px}
.btn-danger{background:var(--danger);color:#fff}
.tab-row{display:flex;gap:0;margin-bottom:22px;border-bottom:1.5px solid var(--line)}
.tab-row button{
  flex:1;padding:10px;font-family:"Silkscreen",monospace;font-size:11px;letter-spacing:1px;
  color:var(--ink-faint);border-bottom:2px solid transparent;margin-bottom:-1.5px;
}
.tab-row button.active{color:var(--vermillion);border-bottom-color:var(--vermillion)}
.hint-box{
  margin-top:18px;padding:12px 14px;background:rgba(232,181,71,.12);
  border:1px dashed var(--gold);border-radius:6px;font-size:13px;color:var(--ink-soft);
}
.hint-box b{color:var(--ink)}
.error-msg{color:var(--danger);font-size:13px;margin-top:8px;min-height:18px}

/* ---------- app shell ---------- */
.shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidebar{
  background:var(--paper-soft);border-right:1.5px solid var(--line);
  padding:24px 18px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 6px 18px;border-bottom:1.5px dashed var(--line);margin-bottom:14px}
.brand .mark{width:38px;height:38px;border-radius:7px;background:var(--ink);display:grid;place-items:center;color:var(--gold);font-family:"Silkscreen",monospace;font-size:13px}
.brand .name{font-family:"Silkscreen",monospace;font-size:13px;letter-spacing:1px;line-height:1.1}
.brand .name small{display:block;font-family:"Caveat",cursive;font-size:14px;color:var(--vermillion);letter-spacing:0;text-transform:none;margin-top:2px}
.nav-section{font-family:"Silkscreen",monospace;font-size:10px;letter-spacing:1.5px;color:var(--ink-faint);padding:14px 10px 6px;text-transform:uppercase}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:6px;
  font-size:14px;color:var(--ink-soft);text-align:left;width:100%;
  transition:background .12s,color .12s;
}
.nav-item:hover{background:var(--paper-deep);color:var(--ink)}
.nav-item.active{background:var(--ink);color:var(--paper-soft)}
.nav-item.active .ic{color:var(--gold)}
.nav-item .ic{width:18px;height:18px;flex-shrink:0;color:var(--ink-faint)}
.nav-item.active .ic{color:var(--gold)}
.nav-item .badge{margin-left:auto;background:var(--vermillion);color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;font-family:"Silkscreen",monospace}
.sidebar .spacer{flex:1}
.user-card{
  display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;background:var(--paper);border:1.5px solid var(--line);
}
.user-card .ava{width:36px;height:36px;border-radius:50%;background:var(--sage);color:#fff;display:grid;place-items:center;font-family:"Silkscreen",monospace;font-size:13px;flex-shrink:0}
.user-card .info{min-width:0;flex:1}
.user-card .info .nm{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-card .info .rl{font-family:"Silkscreen",monospace;font-size:9px;color:var(--ink-faint);letter-spacing:1px;text-transform:uppercase}

.main{padding:32px 40px 60px;max-width:1200px;width:100%}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:28px;flex-wrap:wrap}
.page-head h1{font-size:30px;letter-spacing:-.3px}
.page-head h1 em{font-style:normal;color:var(--vermillion);font-family:"Caveat",cursive;font-size:1.15em}
.page-head .desc{color:var(--ink-soft);font-size:14px;margin-top:4px}
.page-head .crumb{font-family:"Silkscreen",monospace;font-size:10px;letter-spacing:1.5px;color:var(--ink-faint);text-transform:uppercase;margin-bottom:8px}

/* role switcher */
.role-switch{
  display:inline-flex;background:var(--paper-soft);border:1.5px solid var(--line);border-radius:8px;padding:3px;
}
.role-switch button{
  padding:8px 16px;font-family:"Silkscreen",monospace;font-size:10px;letter-spacing:1px;
  color:var(--ink-faint);border-radius:5px;text-transform:uppercase;
}
.role-switch button.active{background:var(--ink);color:var(--gold)}

/* online dot */
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;flex-shrink:0}
.dot.on{background:var(--online);box-shadow:0 0 0 0 rgba(91,174,106,.6);animation:pulse 2s infinite}
.dot.off{background:var(--ink-faint)}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(91,174,106,.55)}
  70%{box-shadow:0 0 0 7px rgba(91,174,106,0)}
  100%{box-shadow:0 0 0 0 rgba(91,174,106,0)}
}
.status-txt{font-family:"Silkscreen",monospace;font-size:9px;letter-spacing:.5px;text-transform:uppercase}
.status-txt.on{color:var(--online)}
.status-txt.off{color:var(--ink-faint)}

/* cards */
.card{
  background:var(--paper-soft);border:1.5px solid var(--line);border-radius:10px;
  padding:20px;box-shadow:var(--shadow);
}
.card.stitched{border-style:dashed;border-color:var(--line-soft)}
.grid{display:grid;gap:18px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:960px){.grid-3,.grid-4{grid-template-columns:repeat(2,1fr)}}
/* ---- 移动端适配 ---- */
.mobile-bar{display:none}
.scrim{display:none}
@media(max-width:860px){
  .auth-wrap{grid-template-columns:1fr}
  .auth-art{padding:40px 28px;min-height:240px}
  .auth-art h1{font-size:32px}
  .auth-art .bead-mosaic{display:none}
  .auth-form{padding:32px 22px}
}
@media(max-width:780px){
  .shell{grid-template-columns:1fr}
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;width:264px;z-index:120;
    transform:translateX(-100%);transition:transform .22s ease;
    box-shadow:6px 0 28px -8px rgba(0,0,0,.35);
  }
  .sidebar.open{transform:translateX(0)}
  .scrim{display:block;position:fixed;inset:0;background:rgba(43,33,24,.45);backdrop-filter:blur(2px);z-index:115;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.show{opacity:1;pointer-events:auto}
  .mobile-bar{
    display:flex;align-items:center;gap:12px;
    position:sticky;top:0;z-index:80;
    background:var(--paper-soft);border-bottom:1.5px solid var(--line);
    padding:12px 16px;margin:-20px -20px 20px;
  }
  .mobile-bar .ham{width:40px;height:40px;border-radius:8px;background:var(--ink);color:var(--gold);display:grid;place-items:center;flex-shrink:0}
  .mobile-bar .ham svg{width:20px;height:20px}
  .mobile-bar .mb-brand{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
  .mobile-bar .mb-brand .mark{width:30px;height:30px;border-radius:6px;background:var(--ink);color:var(--gold);display:grid;place-items:center;font-family:"Silkscreen",monospace;font-size:11px;flex-shrink:0}
  .mobile-bar .mb-brand .nm{font-family:"Silkscreen",monospace;font-size:12px;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mobile-bar .mb-dot{display:flex;align-items:center;gap:5px;font-family:"Silkscreen",monospace;font-size:9px;color:var(--ink-faint)}
  .main{padding:20px;max-width:100%}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .page-head{margin-bottom:20px}
  .page-head h1{font-size:24px}
  .page-head .crumb{font-size:9px}
  .admin-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat{padding:12px 14px}
  .stat .n{font-size:22px}
  .chat-panel{height:calc(100vh - 220px);min-height:420px}
  .chat-body{padding:14px 12px}
  .chat-input{padding:10px}
  .chat-input input{padding:9px 11px}
  .chat-tools{flex-wrap:wrap;gap:5px}
  .chat-tools .btn{padding:6px 9px;font-size:12px}
  .tbl{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
  .tbl thead,.tbl tbody,.tbl tr{display:table;width:100%;table-layout:auto}
  .modal{max-width:100%;max-height:92vh;border-radius:10px 10px 0 0;margin:0}
  .modal-back{align-items:flex-end;padding:0}
  .modal-head{position:sticky;top:0;background:var(--paper-soft);z-index:2}
  .modal-foot{position:sticky;bottom:0;background:var(--paper-soft)}
  .modal-body{padding:18px 16px}
  .md-editor{min-height:200px;font-size:11px}
  .md-preview{min-height:200px}
  .seller-card,.demand-card,.card{padding:16px}
  .role-switch button{padding:7px 12px}
  .nav-item{padding:11px 13px;font-size:15px}
  .nav-item .ic{width:20px;height:20px}
  .btn{min-height:42px}
  .btn-sm{min-height:36px}
  .user-card .info .rl{font-size:8px}
  .field input,.field textarea,.field select{padding:12px 13px;font-size:16px} /* 防 iOS 缩放 */
  .chat-msg{max-width:88%}
  .seal-stamp{font-size:10px;padding:5px 11px}
  .side-panel{position:static}
  .hint-box{font-size:12px}
  .auth-card{max-width:100%}
}
@media(max-width:420px){
  .admin-grid{grid-template-columns:1fr}
  .main{padding:16px}
  .mobile-bar{margin:-16px -16px 16px;padding:10px 14px}
  .page-head h1{font-size:21px}
  .chat-input{flex-wrap:wrap}
  .chat-input input{flex-basis:100%;order:1}
  .chat-tools{order:2;flex:1}
  .chat-input .btn-primary{order:3}
}
/* 大屏隐藏移动元素 */
@media(min-width:781px){.mobile-bar,.scrim{display:none!important}}

/* seller card */
.seller-card{
  background:var(--paper-soft);border:1.5px solid var(--line);border-radius:10px;
  padding:20px;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden;
  transition:transform .12s, box-shadow .15s, border-color .15s;
}
.seller-card:hover{transform:translateY(-2px);box-shadow:0 12px 28px -14px rgba(43,33,24,.3);border-color:var(--vermillion)}
.seller-card.closed{opacity:.7}
.seller-card .top{display:flex;align-items:center;gap:12px}
.seller-card .ava{width:48px;height:48px;border-radius:10px;background:var(--plum);color:#fff;display:grid;place-items:center;font-family:"Silkscreen",monospace;font-size:16px;flex-shrink:0;position:relative}
.seller-card .ava .corner-dot{position:absolute;right:-2px;bottom:-2px;width:12px;height:12px;border-radius:50%;border:2px solid var(--paper-soft)}
.seller-card .nm{font-weight:600;font-size:17px}
.seller-card .meta{font-size:12px;color:var(--ink-faint);margin-top:2px;display:flex;align-items:center;gap:6px}
.seller-card .bio{font-size:14px;color:var(--ink-soft);min-height:40px}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-family:"Silkscreen",monospace;font-size:9px;letter-spacing:.5px;padding:3px 7px;border-radius:4px;background:var(--paper-deep);color:var(--ink-soft);text-transform:uppercase}
.tag.sage{background:rgba(122,158,110,.18);color:var(--sage-deep)}
.tag.gold{background:rgba(232,181,71,.2);color:#8a6a1f}
.tag.verm{background:rgba(217,79,58,.14);color:var(--vermillion-deep)}
.seller-card .open-badge{position:absolute;top:12px;right:12px;font-family:"Silkscreen",monospace;font-size:9px;letter-spacing:1px;padding:3px 7px;border-radius:4px}
.seller-card .open-badge.yes{background:rgba(91,174,106,.18);color:var(--sage-deep)}
.seller-card .open-badge.no{background:var(--paper-deep);color:var(--ink-faint)}

/* demand card (seller sees buyer demands) */
.demand-card{background:var(--paper-soft);border:1.5px solid var(--line);border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:10px}
.demand-card .head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.demand-card .ttl{font-weight:600;font-size:16px}
.demand-card .body{color:var(--ink-soft);font-size:14px}
.demand-card .by{font-size:12px;color:var(--ink-faint);display:flex;align-items:center;gap:6px}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{text-align:left;font-family:"Silkscreen",monospace;font-size:10px;letter-spacing:1px;color:var(--ink-faint);text-transform:uppercase;padding:10px 12px;border-bottom:1.5px solid var(--line)}
.tbl td{padding:12px;border-bottom:1px solid var(--line-soft)}
.tbl tr:hover td{background:var(--paper)}
.tbl tr:last-child td{border-bottom:none}

/* status pill */
.pill{display:inline-flex;align-items:center;gap:5px;font-family:"Silkscreen",monospace;font-size:9px;letter-spacing:.5px;padding:3px 8px;border-radius:4px;text-transform:uppercase}
.pill.neg{background:rgba(138,120,96,.18);color:var(--ink-soft)}
.pill.agreed{background:rgba(232,181,71,.22);color:#8a6a1f}
.pill.pay{background:rgba(107,76,122,.16);color:var(--plum)}
.pill.paid{background:rgba(122,158,110,.2);color:var(--sage-deep)}
.pill.progress{background:rgba(217,79,58,.14);color:var(--vermillion-deep)}
.pill.done{background:var(--sage);color:#fff}
.pill.cancel{background:var(--paper-deep);color:var(--ink-faint)}
.pill.dispute{background:var(--danger);color:#fff}

/* chat */
.chat-layout{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
@media(max-width:1000px){.chat-layout{grid-template-columns:1fr}}
.chat-panel{display:flex;flex-direction:column;height:600px}
.chat-head{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1.5px solid var(--line);background:var(--paper-soft);border-radius:10px 10px 0 0}
.chat-head .ava{width:40px;height:40px;border-radius:50%;background:var(--bead);color:#fff;display:grid;place-items:center;font-family:"Silkscreen",monospace;font-size:13px}
.chat-head .nm{font-weight:600}
.chat-head .meta{font-size:12px;display:flex;align-items:center;gap:6px}

<script>
/* =========================================================================
   豆粒工坊 · 拼豆代拼接单系统
   单文件应用 · localStorage 持久化
   ========================================================================= */

/* ---------- 极简 markdown 渲染 ---------- */
function renderMd(md){
  if(!md) return '<p class="muted">（暂无内容）</p>';
  let h = md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // tables
  h = h.replace(/^(\|.+\|)\n(\|[\s\-:|]+\|)\n((?:\|.+\|\n?)*)/gm,(m,h1,h2,body)=>{
    const heads = h1.split('|').filter(x=>x.trim()).map(x=>x.trim());
    const rows = body.trim().split('\n').map(r=>r.split('|').filter(x=>x.trim()).map(x=>x.trim()));
    let t='<table><thead><tr>'+heads.map(c=>`<th>${c}</th>`).join('')+'</tr></thead><tbody>';
    rows.forEach(r=>{ t+='<tr>'+r.map(c=>`<td>${c}</td>`).join('')+'</tr>'; });
    return t+'</tbody></table>';
  });
  h = h.replace(/^### (.+)$/gm,'<h3>$1</h3>')
       .replace(/^## (.+)$/gm,'<h2>$1</h2>')
       .replace(/^# (.+)$/gm,'<h1>$1</h1>')
       .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
       .replace(/\*(.+?)\*/g,'<em>$1</em>')
       .replace(/`(.+?)`/g,'<code>$1</code>')
       .replace(/^---$/gm,'<hr>')
       .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
       .replace(/(<li>.*<\/li>\n?)+/g,m=>`<ul>${m}</ul>`)
       .replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  h = h.split(/\n\n+/).map(b=>{
    if(/^\s*<(h\d|ul|ol|table|hr)/.test(b)) return b;
    return `<p>${b.replace(/\n/g,'<br>')}</p>`;
  }).join('\n');
  return h;
}

/* ---------- 工具 ---------- */
const $ = (s,p=document)=>p.querySelector(s);
const $$ = (s,p=document)=>[...p.querySelectorAll(s)];
const uid = p=>p+'_'+Math.random().toString(36).slice(2,9);
const now = ()=>Date.now();
const esc = s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function timeAgo(ts){
  if(!ts) return '很久以前';
  const d = Math.floor((now()-ts)/1000);
  if(d<60) return '刚刚';
  if(d<3600) return Math.floor(d/60)+'分钟前';
  if(d<86400) return Math.floor(d/3600)+'小时前';
  return Math.floor(d/86400)+'天前';
}
function fmtTime(ts){if(!ts)return'';const d=new Date(ts);return d.getMonth()+1+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return 'h'+Math.abs(h).toString(36);}

/* 设备指纹 */
function getDeviceId(){
  let id = localStorage.getItem('perler_device_id');
  if(id) return id;
  const fp = [navigator.userAgent,navigator.language,navigator.platform,screen.width+'x'+screen.height,screen.colorDepth,Intl.DateTimeFormat().resolvedOptions().timeZone,navigator.hardwareConcurrency||0].join('|');
  id = 'dev_'+hash(fp);
  localStorage.setItem('perler_device_id',id);
  return id;
}
function deviceLabel(){
  const ua = navigator.userAgent;
  let os='未知系统';
  if(/Windows/i.test(ua))os='Windows';
  else if(/Mac/i.test(ua))os='macOS';
  else if(/Android/i.test(ua))os='Android';
  else if(/iPhone|iPad/i.test(ua))os='iOS';
  else if(/Linux/i.test(ua))os='Linux';
  let br='浏览器';
  if(/Edg/i.test(ua))br='Edge';
  else if(/Chrome/i.test(ua))br='Chrome';
  else if(/Firefox/i.test(ua))br='Firefox';
  else if(/Safari/i.test(ua))br='Safari';
  return os+' · '+br+' · '+screen.width+'×'+screen.height;
}

/* ---------- 数据层 ---------- */
const ADMIN_DEFAULT_USER = 'admin';
const ADMIN_DEFAULT_PASS = 'Atelier#2026';
const BAN_LIMIT = 2;

const DB = {
  data:null,
  load(){
    const raw = localStorage.getItem('perler_db');
    if(raw){ this.data = JSON.parse(raw); return; }
    this.data = this.seed();
    this.save();
  },
  save(){ localStorage.setItem('perler_db',JSON.stringify(this.data)); },
  seed(){
    const t = now();
    const mk = (u,p,role,extra={})=>({
      id:uid('u'),username:u,passwordHash:hash(p),role:role,
      activeRole:role==='admin'?'admin':'buyer',
      isOnline:false,lastActive:t-Math.floor(Math.random()*600000),
      seller:{open:false,bio:'',specialties:[],avatar:u.slice(0,2).toUpperCase()},
      buyer:{avatar:u.slice(0,2).toUpperCase()},
      banCount:0,banned:false,bannedReason:'',
      deviceId:getDeviceId(),deviceLabel:deviceLabel(),createdAt:t,
      ...extra
    });
    const admin = mk(ADMIN_DEFAULT_USER,ADMIN_DEFAULT_PASS,'admin',{activeRole:'admin',buyer:{avatar:'AD'}});
    const mochi = mk('豆豆麻麻','demo123','user',{
      activeRole:'seller',
      seller:{open:true,bio:'五年拼豆手作人，擅长萌系动物与Q版人物，豆板整齐熨烫均匀。',specialties:['萌系动物','Q版人物','钥匙扣'],avatar:'豆麻'},
      lastActive:t-30000,
    });
    const pix = mk('像素工坊','demo123','user',{
      activeRole:'seller',
      seller:{open:true,bio:'专注风景与像素画复刻，支持大尺寸装裱，可定制图纸。',specialties:['风景','像素画','装裱'],avatar:'像坊'},
      lastActive:t-120000,
    });
    const bead = mk('一粒一豆','demo123','user',{
      activeRole:'seller',
      seller:{open:false,bio:'人物肖像与动漫角色代拼，工期稳定。',specialties:['人物','动漫'],avatar:'一豆'},
      lastActive:t-3600000,
    });
    const buyer1 = mk('小满','demo123','user',{activeRole:'buyer',buyer:{avatar:'小满'},lastActive:t-200000});
    const buyer2 = mk('栗子','demo123','user',{activeRole:'buyer',buyer:{avatar:'栗子'},lastActive:t-900000});

    return {
      users:[admin,mochi,pix,bead,buyer1,buyer2],
      orders:[
        {
          id:uid('o'),buyerId:buyer1.id,sellerId:mochi.id,
          title:'柴犬钥匙扣代拼',description:'想要一只柴犬拼豆钥匙扣，大约5cm大小，送朋友。',
          status:'in_progress',
          agreement:{
            markdown:'# 代拼协议\n\n## 工期\n- 预计完成：7个工作日\n- 开工日期：已开工\n\n## 成品规格\n- 尺寸：5cm × 5cm\n- 豆子品牌：Perler\n- 是否熨烫：是（中度）\n\n## 豆子数量\n- 总计：约 480 颗\n\n## 价格\n- 总价：¥ 58\n- 已付全款\n\n## 质量标准\n- 熨烫均匀，无错位',
            buyerConfirmed:true,sellerConfirmed:true,confirmedAt:t-86400000
          },
          payment:{method:'支付宝 138****8888',amount:58,paidAt:t-80000000,confirmedAt:t-70000000},
          chat:[
            {from:buyer1.id,text:'你好，想拼一只柴犬钥匙扣～',type:'text',ts:t-100000000},
            {from:mochi.id,text:'可以的呢，大概5cm大小，用Perler豆，58元含运费。',type:'text',ts:t-98000000},
            {from:mochi.id,text:'',type:'agreement',ts:t-90000000},
            {from:buyer1.id,text:'协议确认，没问题！',type:'text',ts:t-89000000},
            {from:mochi.id,text:'支付宝 138****8888',type:'payment_method',ts:t-82000000},
            {from:buyer1.id,text:'已转账，麻烦查收',type:'text',ts:t-81000000},
            {from:mochi.id,text:'收到啦，开始拼了～',type:'text',ts:t-70000000},
          ],
          createdAt:t-100000000
        }
      ],
      devices:[{id:getDeviceId(),banCount:0,label:deviceLabel(),firstSeen:t}],
      complaints:[],
      session:{userId:null,activeRole:null},
      adminPassword:ADMIN_DEFAULT_PASS,
      adminPasswordChanged:false,
    };
  }
};

DB.load();

/* ---------- 状态 ---------- */
const State = {
  view:'login',
  currentOrderId:null,
  modalContent:null,
};

function curUser(){ const s=DB.data.session; return s.userId?DB.data.users.find(u=>u.id===s.userId):null; }
function getUser(id){ return DB.data.users.find(u=>u.id===id); }
function isOnline(u){ if(!u)return false; if(u.id===DB.data.session.userId)return true; return (now()-u.lastActive)<120000; }
function touchUser(){ const u=curUser(); if(u){u.lastActive=now();u.isOnline=true;} }

/* 设备封禁检查 */
function deviceBanCount(){
  const dev = DB.data.devices.find(d=>d.id===getDeviceId());
  return dev?dev.banCount:0;
}
function deviceCanRegister(){
  return deviceBanCount() < BAN_LIMIT;
}
function recordDevice(){
  const id=getDeviceId();
  let dev=DB.data.devices.find(d=>d.id===id);
  if(!dev){ dev={id,label:deviceLabel(),banCount:0,firstSeen:now()}; DB.data.devices.push(dev); }
  dev.label=deviceLabel();
  return dev;
}

/* ---------- Toast ---------- */
function toast(msg,type='info'){
  const el=document.createElement('div');
  el.className='toast '+(type==='ok'?'ok':type==='err'?'err':'');
  el.textContent=msg;
  $('#toasts').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},2800);
}

/* ---------- Modal ---------- */
function openModal(title,bodyHtml,footHtml=''){
  $('#modalBack').innerHTML=`<div class="modal"><div class="modal-head"><h3>${title}</h3><button class="x" onclick="closeModal()">×</button></div><div class="modal-body">${bodyHtml}</div>${footHtml?`<div class="modal-foot">${footHtml}</div>`:''}</div>`;
  $('#modalBack').classList.add('show');
}
function closeModal(){ $('#modalBack').classList.remove('show'); $('#modalBack').innerHTML=''; document.body.style.overflow=''; }
$('#modalBack')&&$('#modalBack').addEventListener('click',e=>{if(e.target===$('#modalBack'))closeModal();});

/* ---------- 认证 ---------- */
function register(username,password){
  username=username.trim();
  if(username.length<2) return '用户名至少2个字符';
  if(password.length<6) return '密码至少6位';
  if(DB.data.users.some(u=>u.username===username)) return '用户名已存在';
  if(username.toLowerCase()===ADMIN_DEFAULT_USER) return '该用户名受保护';
  if(!deviceCanRegister()){
    return '该设备已被封禁 '+deviceBanCount()+' 次以上，无法注册新账号。如有疑问请联系管理员。';
  }
  recordDevice();
  const u={
    id:uid('u'),username,passwordHash:hash(password),role:'user',
    activeRole:'buyer',isOnline:true,lastActive:now(),
    seller:{open:false,bio:'',specialties:[],avatar:username.slice(0,2)},
    buyer:{avatar:username.slice(0,2)},
    banCount:0,banned:false,bannedReason:'',
    deviceId:getDeviceId(),deviceLabel:deviceLabel(),createdAt:now()
  };
  DB.data.users.push(u);
  DB.data.session={userId:u.id,activeRole:'buyer'};
  DB.save();
  touchUser();
  toast('注册成功，欢迎来到豆粒工坊','ok');
  return null;
}
function login(username,password){
  username=username.trim();
  const u=DB.data.users.find(x=>x.username===username);
  if(!u) return '用户不存在';
  const passOk = u.role==='admin' ? (password===DB.data.adminPassword) : (u.passwordHash===hash(password));
  if(!passOk) return '密码错误';
  if(u.banned){
    // 检查设备封禁

function createOrder(sellerId,title,description){

function sendMsg(orderId,text,type='text'){

function proposeAgreement(orderId,md,fields){
  const o=DB.data.orders.find(x=>x.id===orderId);if(!o)return;
  o.agreement.markdown=md;
  if(fields)o.agreement.fields=fields;
  o.agreement.buyerConfirmed=false;

  o.agreement.confirmedAt=null;
  o.chat.push({from:curUser().id,text:'已更新代拼协议，请双方确认',type:'agreement',ts:now()});

}
function confirmAgreement(orderId,who){
  const o=DB.data.orders.find(x=>x.id===orderId);if(!o)return;
  o.agreement[who+'Confirmed']=true;
  if(o.agreement.buyerConfirmed&&o.agreement.sellerConfirmed){
    o.agreement.confirmedAt=now();
    o.status='agreed';
    o.chat.push({from:'system',text:'双方已确认代拼协议 ✦ 卖家可发送付款方式',type:'system',ts:now()});
  }else{
    o.chat.push({from:curUser().id,text:'已确认协议'+(who==='buyer'?'（买家）':'（卖家）')+'，等待对方确认',type:'agreement',ts:now()});
  }
  DB.save();
}
function sendPaymentMethod(orderId,method,amount){
  const o=DB.data.orders.find(x=>x.id===orderId);if(!o)return '订单不存在';
  if(o.status!=='agreed')return '需双方确认协议后才能发送付款方式';
  if(!method.trim())return '请填写付款方式';
  o.payment.method=method.trim();
  o.payment.amount=amount||0;
  o.status='awaiting_payment';
  o.chat.push({from:curUser().id,text:'付款方式：'+method+(amount?('（¥'+amount+'）'):''),type:'payment_method',ts:now()});
  DB.save();
  return null;
}
function markPaid(orderId){
  const o=DB.data.orders.find(x=>x.id===orderId);if(!o)return '订单不存在';
  if(o.status!=='awaiting_payment')return '当前不可标记已付款';
  if(!(o.agreement.buyerConfirmed&&o.agreement.sellerConfirmed))return '需双方确认协议后才可付款';
  o.status='paid';
  o.payment.paidAt=now();
  o.chat.push({from:curUser().id,text:'我已付款，请卖家确认收款',type:'text',ts:now()});
  o.chat.push({from:'system',text:'买家已标记付款。确认后不可取消，取消需与卖家沟通。',type:'system',ts:now()});
  DB.save();
  return null;
}
function confirmPayment(orderId){
  const o=DB.data.orders.find(x=>x.id===orderId);if(!o)return '订单不存在';
  if(o.status!=='paid')return '当前不可确认收款';
  o.status='in_progress';
  o.payment.confirmedAt=now();
  o.chat.push({from:curUser().id,text:'已确认收款，开始代拼～',type:'text',ts:now()});
  o.chat.push({from:'system',text:'卖家已确认收款并开始代拼',type:'system',ts:now()});
  DB.save();
  return null;
}
function completeOrder(orderId){
  const o=DB.data.orders.find(x=>x.id===orderId);if(!o)return '订单不存在';
  if(o.status!=='in_progress')return '当前不可完成';
  o.status='completed';
  o.chat.push({from:curUser().id,text:'代拼完成，已交付 ✦',type:'text',ts:now()});
  o.chat.push({from:'system',text:'订单已完成',type:'system',ts:now()});
  DB.save();
  return null;
}
function requestCancel(orderId,reason){
  const o=DB.data.orders.find(x=>x.id===orderId);if(!o)return '订单不存在';
  if(!['paid','in_progress','agreed','awaiting_payment'].includes(o.status))return '当前状态不可取消';
  o.status='cancel_requested';
  o.cancelReason=reason;
  o.chat.push({from:curUser().id,text:'申请取消订单：'+reason,type:'text',ts:now()});
  o.chat.push({from:'system',text:'取消申请已提交，需卖家同意。卖家可设定取消费用（也可不收）。',type:'system',ts:now()});
  DB.save();
  return null;
}
function resolveCancel(orderId,approve,fee,waved){
  const o=DB.data.orders.find(x=>x.id===orderId);if(!o)return '订单不存在';
  if(o.status!=='cancel_requested')return '当前无取消申请';
  if(approve){
    o.status='cancelled';
    o.payment.cancelFee = waved?0:(fee||0);
    o.payment.feeWaved = !!waved;
    o.chat.push({from:curUser().id,text:'同意取消'+(waved?'（不收取消费）':(fee?('，需支付取消费 ¥'+fee):'')),type:'text',ts:now()});
    o.chat.push({from:'system',text:'订单已取消',type:'system',ts:now()});
  }else{
    o.status='in_progress';
    o.chat.push({from:curUser().id,text:'拒绝取消，继续代拼',type:'text',ts:now()});
  }
  DB.save();
  return null;
}
function fileComplaint(orderId,reason,evidence){
  const o=DB.data.orders.find(x=>x.id===orderId);if(!o)return '订单不存在';
  const u=curUser();
  const againstId = u.id===o.buyerId?o.sellerId:o.buyerId;
  DB.data.complaints.unshift({
    id:uid('c'),orderId,complainantId:u.id,againstId,
    reason:reason.trim(),evidence:evidence.split('\n').map(s=>s.trim()).filter(Boolean),
    status:'pending',createdAt:now()
  });
  o.status='disputed';
  o.chat.push({from:'system',text:'已提交投诉，等待管理员审核',type:'system',ts:now()});
  DB.save();
  return null;
}
function adminBanUser(userId,reason){
  const u=getUser(userId);if(!u)return '用户不存在';
  if(u.role==='admin')return '不能封禁管理员';
  u.banned=true;

/* 协议字段定义：id/label/placeholder/类型(text/number/select/textarea)/选项 */
const AGREE_FIELDS = [
  {section:'工期',items:[
    {id:'workDays',label:'预计工期',ph:'如 7',type:'number',unit:'个工作日'},
    {id:'startDate',label:'开工日期',ph:'如 确认收款后次日',type:'text'},
  ]},
  {section:'成品规格',items:[
    {id:'sizeW',label:'尺寸 宽',ph:'如 5',type:'number',unit:'cm'},
    {id:'sizeH',label:'尺寸 高',ph:'如 5',type:'number',unit:'cm'},
    {id:'beadBrand',label:'豆子品牌',ph:'如 Perler / 咪小窝',type:'text'},
    {id:'iron',label:'是否熨烫',type:'select',opts:['是','否','轻度','中度','重度']},
    {id:'frame',label:'是否装裱',type:'select',opts:['否','是（含装裱）','是（仅背板）']},
  ]},
  {section:'豆子数量',items:[
    {id:'mainColorCount',label:'主色用量',ph:'如 200',type:'number',unit:'颗'},
    {id:'totalCount',label:'总豆量',ph:'如 480',type:'number',unit:'颗'},
  ]},
  {section:'图纸',items:[
    {id:'patternSource',label:'图纸来源',ph:'如 买家提供 / 卖家设计 / 网图',type:'text'},
    {id:'needDesign',label:'是否需设计',type:'select',opts:['否','是（+设计费）']},
  ]},
  {section:'价格',items:[
    {id:'totalPrice',label:'总价',ph:'如 58',type:'number',unit:'元'},
    {id:'deposit',label:'定金',ph:'如 0',type:'number',unit:'元'},
  ]},
  {section:'质量标准',items:[
    {id:'ironLevel',label:'熨烫程度',type:'select',opts:['轻度','中度','重度','双面熨烫']},
    {id:'firmness',label:'拼接牢固度',type:'select',opts:['标准','加固','超加固']},
    {id:'colorTolerance',label:'色差容忍度',type:'select',opts:['严格对色','允许微差','允许近似色替换']},
  ]},
  {section:'其他约定',items:[
    {id:'notes',label:'补充说明',ph:'如 包邮 / 含钥匙扣配件 / 修改次数等',type:'textarea'},
  ]},
];

/* 默认空字段 */
function emptyAgreeFields(){
  const f={};
  AGREE_FIELDS.forEach(s=>s.items.forEach(it=>{f[it.id]='';}));
  return f;
}

/* 字段 → markdown */
function fieldsToMd(f){
  if(!f) return DEFAULT_AGREEMENT_MD;
  const has = v => v!==undefined&&v!==null&&String(v).trim()!=='';
  const line = (label,val,unit='') => has(val)?`- ${label}：${val}${unit}`:`- ${label}：____`;
  let md = `# 代拼协议\n\n`;
  AGREE_FIELDS.forEach(sec=>{
    md += `## ${sec.section}\n`;
    sec.items.forEach(it=>{
      const v = f[it.id];
      if(it.type==='textarea'){
        md += has(v)?`- ${v}\n`:`- ____\n`;
      }else{
        md += line(it.label,v,it.unit||'')+'\n';
      }
    });
    md += `\n`;
  });
  // 尺寸合并显示更友好（保留原始字段，但在规格段额外提示）— 这里保持逐行清晰
  return md.trim();
}

/* markdown → 字段（尽力解析，兼容旧数据） */
function mdToFields(md){
  const f = emptyAgreeFields();
  if(!md) return f;
  const get = label => {
    const m = md.match(new RegExp(`${label}[：:]\\s*([^\\n-]+)`));
    return m?m[1].trim():'';
  };
  AGREE_FIELDS.forEach(sec=>sec.items.forEach(it=>{
    if(it.type==='textarea'){
      // 其他约定取该段最后一行
      const m = md.match(/## 其他约定[\s\S]*?-\s*([^\n-]+)/);
      f[it.id]=m?m[1].trim():'';
    }else{
      let raw = get(it.label);
      // 去掉单位后缀
      if(it.unit && raw.endsWith(it.unit)) raw = raw.slice(0,-it.unit.length).trim();
      f[it.id]=raw;
    }
  }));
  return f;
}

function navBadge(v){
  const u=curUser();if(!u)return'';
  if(v==='orders'){
    const n=DB.data.orders.filter(o=>(u.role==='admin'?true:(o.buyerId===u.id||o.sellerId===u.id))&&o.chat&&o.chat.length&&o.chat[o.chat.length-1].from!==u.id&&o.chat[o.chat.length-1].type!=='system').length;
    return n?`<span class="badge">${n}</span>`:'';
  }
  if(v==='adminComplaints' && u.role==='admin'){
    const n=DB.data.complaints.filter(c=>c.status==='pending').length;
    return n?`<span class="badge">${n}</span>`:'';
  }

function go(v){ State.view=v; render(); closeSidebar(); }

/* ---------- 视图分发 ---------- */
function renderView(){
  const main=$('#mainView');if(!main)return;
  const v=State.view;
  if(v==='login')return;
  if(v==='buyerDash')main.innerHTML=viewBuyerDash();
  else if(v==='sellerDash')main.innerHTML=viewSellerDash();
  else if(v==='demands')main.innerHTML=viewDemands();
  else if(v==='orders')main.innerHTML=viewOrders();
  else if(v==='orderDetail'){main.innerHTML=viewOrderDetail();bindOrderDetail();}
  else if(v==='my')main.innerHTML=viewMy();
  else if(v==='admin')main.innerHTML=viewAdmin();
  else if(v==='adminUsers')main.innerHTML=viewAdminUsers();
  else if(v==='adminOrders')main.innerHTML=viewAdminOrders();
  else if(v==='adminComplaints')main.innerHTML=viewAdminComplaints();
  else if(v==='adminDevices')main.innerHTML=viewAdminDevices();
  else main.innerHTML=viewBuyerDash();
}

function avatarColor(id){

  return cs[Math.abs(h)%cs.length];

  </div>

  <div class="grid grid-4">${buyers.map(b=>{
    const on=isOnline(b);
    return `<div class="card" style="text-align:center">
      <div class="ava" style="width:48px;height:48px;border-radius:50%;background:${avatarColor(b.id)};color:#fff;display:grid;place-items:center;font-family:'Silkscreen',monospace;margin:0 auto 8px">${esc(b.buyer.avatar)}</div>

    </div>`;

function acceptDemand(orderId){
  // 把订单卖家改为自己
  const o=DB.data.orders.find(x=>x.id===orderId);if(!o)return;
  if(o.sellerId===curUser().id){toast('这是你自己的订单','err');return;}
  o.sellerId=curUser().id;
  o.chat.push({from:'system',text:curUser().username+' 接单，开始洽谈',type:'system',ts:now()});
  DB.save();
  toast('接单成功','ok');
  State.view='orderDetail';State.currentOrderId=o.id;render();
}
function contactBuyer(buyerId){
  // 创建一个卖家发起的洽谈订单
  const u=curUser();
  let o=DB.data.orders.find(x=>x.buyerId===buyerId&&x.sellerId===u.id&&x.status==='negotiating');
  if(!o){
    const err=createOrder(u.id,'卖家主动联系','卖家主动发起洽谈'); // 这里 sellerId 应为当前卖家
    if(err){toast(err,'err');return;}
    o=DB.data.orders[0];
    o.buyerId=buyerId;o.sellerId=u.id;
    o.chat=[{from:u.id,text:'你好，看到你的需求，可以聊聊～',type:'text',ts:now()}];
    DB.save();
  }
  State.view='orderDetail';State.currentOrderId=o.id;render();
}

function renderMsg(m,o,u){
  if(m.type==='system'){
    return `<div class="chat-msg system"><div class="bubble">${esc(m.text)}</div></div>`;
  }
  const me=m.from===u.id;
  const fromUser=getUser(m.from);
  const ava=fromUser?(fromUser.activeRole==='seller'?fromUser.seller.avatar:fromUser.buyer.avatar):'?';
  if(m.type==='agreement'){

let _agreeAdvanced=false;

function renderAgreeEditor(orderId){
  const o=DB.data.orders.find(x=>x.id===orderId);
  const fields = o.agreement.fields || mdToFields(o.agreement.markdown);
  const title = _agreeAdvanced?'代拼协议 · 高级模式':'编辑代拼协议';
  const toggleBtn = `<button class="btn btn-ghost btn-sm" onclick="_agreeAdvanced=${!_agreeAdvanced};renderAgreeEditor('${orderId}')">${_agreeAdvanced?'返回表单':'高级 Markdown'}</button>`;
  let body;
  if(_agreeAdvanced){
    body = `<div class="grid grid-2"><textarea class="md-editor" id="agreeMd" oninput="$('#agreePrev').innerHTML=renderMd(this.value)">${esc(o.agreement.markdown)}</textarea><div class="md-preview" id="agreePrev">${renderMd(o.agreement.markdown)}</div></div>
      <div class="hint-box mt">高级模式下可直接编辑 Markdown。保存后将根据内容重新解析字段（可能丢失部分格式）。</div>`;
  }else{
    body = `
    <div class="agree-form" id="agreeForm">
      ${AGREE_FIELDS.map(sec=>`
        <div class="agree-sec">
          <div class="agree-sec-ttl">${sec.section}</div>
          <div class="agree-grid">
            ${sec.items.map(it=>{
              const v = fields[it.id]||'';
              if(it.type==='select'){
                return `<div class="field agree-field"><label>${it.label}</label><select data-fid="${it.id}"><option value="">请选择</option>${it.opts.map(o=>`<option ${v===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
              }
              if(it.type==='textarea'){
                return `<div class="field agree-field agree-field-wide"><label>${it.label}</label><textarea data-fid="${it.id}" placeholder="${it.ph||''}">${esc(v)}</textarea></div>`;
              }
              return `<div class="field agree-field"><label>${it.label}${it.unit?` <span class="muted" style="font-size:10px">(${it.unit})</span>`:''}</label><input data-fid="${it.id}" type="${it.type==='number'?'number':'text'}" placeholder="${it.ph||''}" value="${esc(v)}"></div>`;
            }).join('')}
          </div>
        </div>
      `).join('')}
    </div>
    <div class="divider">实时预览</div>
    <div class="md-preview" id="agreePrev" style="min-height:160px">${renderMd(fieldsToMd(collectAgreeFields()))}</div>
    <div class="hint-box mt">填写完字段后点击「保存协议」。任一方修改协议后，双方确认状态会重置；协议确认后买家才可点击「已付款」。</div>`;
  }
  openModal(title, `<div class="row between mb"><span class="pixel" style="font-size:10px;color:var(--ink-faint)">填写协议条款</span>${toggleBtn}</div>${body}`,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-accent" onclick="saveAgree('${orderId}')">保存协议</button>`);
  // 绑定实时预览
  if(!_agreeAdvanced){
    $$('#agreeForm [data-fid]').forEach(el=>{
      el.addEventListener('input',()=>{ $('#agreePrev').innerHTML=renderMd(fieldsToMd(collectAgreeFields())); });
    });
  }
}
function collectAgreeFields(){
  const f={};
  $$('#agreeForm [data-fid]').forEach(el=>{ f[el.dataset.fid]=el.value; });
  return f;

function viewAdminOrders(){
  return `
  <div class="page-head"><div><div class="crumb">ADMIN · 订单</div><h1>订单管理</h1></div></div>
  ${orderListAdmin()}`;
}
function orderListAdmin(){
  const list=DB.data.orders;
  return `<table class="tbl"><thead><tr><th>订单</th><th>买家</th><th>卖家</th><th>状态</th><th>金额</th><th>创建</th><th></th></tr></thead><tbody>
  ${list.map(o=>{
    const b=getUser(o.buyerId),s=getUser(o.sellerId);
    return `<tr>
      <td><div style="font-weight:500">${esc(o.title)}</div><div style="font-size:11px;color:var(--ink-faint)">${o.id}</div></td>
      <td>${esc(b?b.username:'?')}</td>
      <td>${esc(s?s.username:'?')}</td>
      <td><span class="pill ${STATUS_PILL[o.status]}">${STATUS_LABEL[o.status]}</span></td>
      <td>${o.payment.amount?('¥'+o.payment.amount):'—'}</td>
      <td style="font-size:12px;color:var(--ink-faint)">${fmtTime(o.createdAt)}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="openOrderAdmin('${o.id}')">查看</button></td>
    </tr>`;
  }).join('')}
  </tbody></table>`;
}
function openOrderAdmin(id){
  const o=DB.data.orders.find(x=>x.id===id);
  openModal('订单详情 · '+o.title,
    `<div class="kv"><span class="k">买家</span><span class="v">${esc(getUser(o.buyerId)?.username)}</span></div>
     <div class="kv"><span class="k">卖家</span><span class="v">${esc(getUser(o.sellerId)?.username)}</span></div>
     <div class="kv"><span class="k">状态</span><span class="v"><span class="pill ${STATUS_PILL[o.status]}">${STATUS_LABEL[o.status]}</span></span></div>
     <div class="kv"><span class="k">金额</span><span class="v">${o.payment.amount?('¥'+o.payment.amount):'—'}</span></div>
     <div class="kv"><span class="k">付款方式</span><span class="v">${esc(o.payment.method||'—')}</span></div>
     <div class="divider">协议</div>
     <div class="md" style="max-height:200px;overflow:auto">${renderMd(o.agreement.markdown)}</div>
     <div class="divider">聊天记录</div>
     <div style="max-height:240px;overflow:auto;display:flex;flex-direction:column;gap:8px">${o.chat.map(m=>{
       if(m.type==='system')return `<div class="chat-msg system"><div class="bubble">${esc(m.text)}</div></div>`;
       const fu=getUser(m.from);
       return `<div class="chat-msg"><div class="ava" style="width:24px;height:24px;font-size:10px">${esc(fu?fu.username.slice(0,2):'?')}</div><div class="bubble" style="padding:6px 10px;font-size:13px"><b>${esc(fu?fu.username:'系统')}</b> · <span style="font-size:10px;color:var(--ink-faint)">${fmtTime(m.ts)}</span><br>${esc(m.text||'['+m.type+']')}</div></div>`;
     }).join('')}</div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">关闭</button>`);
}
function viewAdminComplaints(){
  const comps=DB.data.complaints;
  return `
  <div class="page-head"><div><div class="crumb">ADMIN · 投诉</div><h1>投诉审核</h1></div></div>
  ${comps.length?comps.map(c=>{
    const a=getUser(c.complainantId),b=getUser(c.againstId);const o=DB.data.orders.find(x=>x.id===c.orderId);
    return `<div class="card mb">
      <div class="between mb">
        <div><div style="font-weight:600">${esc(a?a.username:'?')} → 投诉 → ${esc(b?b.username:'?')}</div>
        <div class="row gap-sm"><span class="pill ${c.status==='pending'?'dispute':'done'}">${c.status==='pending'?'待审核':'已处理'}</span><span style="font-size:12px;color:var(--ink-faint)">${fmtTime(c.createdAt)}</span></div>
      </div>
      <div class="kv"><span class="k">相关订单</span><span class="v">${esc(o?o.title:'?')}</span></div>
      <div class="kv"><span class="k">原因</span><span class="v" style="max-width:400px;text-align:right">${esc(c.reason)}</span></div>
      <div class="mt"><div class="pixel" style="font-size:10px;color:var(--ink-soft);margin-bottom:6px">证据</div>${c.evidence.map(e=>`<div class="evidence-item">${esc(e)}</div>`).join('')}</div>
      ${c.status==='pending'?`<div class="warn-box mt">封禁后该用户无法登录，且钱款无法通过平台追回，请告知用户自行维权。</div>
      <div class="row gap-sm mt">
        <button class="btn btn-danger btn-sm" onclick="openBanFromComplaint('${c.id}','${c.againstId}')">封禁被投诉方</button>
        <button class="btn btn-ghost btn-sm" onclick="doDismissComplaint('${c.id}')">驳回投诉</button>
      </div>`:`<div class="muted mt" style="font-size:13px">已处理</div>`}
    </div>`;
  }).join(''):`<div class="empty"><div class="big">○</div><div class="hand">暂无投诉</div></div>`}`;
}
function openBanFromComplaint(cid,uid){
  const u=getUser(uid);
  openModal('封禁 '+u.username,
    `<div class="warn-box mb">封禁后用户无法登录，设备封禁次数 +1。<b>钱款无法追回</b>。</div>
     <div class="field"><label>封禁原因</label><textarea id="banReason2" placeholder="违约/欺诈等"></textarea></div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-danger" onclick="doBanFromComplaint('${cid}','${uid}')">确认封禁</button>`);
}
function doBanFromComplaint(cid,uid){
  const r=$('#banReason2').value.trim();
  if(!r){toast('请填写原因','err');return;}
  adminBanUser(uid,r);
  adminResolveComplaint(cid,'resolved_ban');
  closeModal();toast('已封禁并结案','ok');render();
}
function doDismissComplaint(cid){
  adminResolveComplaint(cid,'resolved_dismiss');
  // 订单状态恢复
  const c=DB.data.complaints.find(x=>x.id===cid);
  const o=DB.data.orders.find(x=>x.id===c.orderId);
  if(o&&o.status==='disputed')o.status='in_progress';
  DB.save();
  toast('已驳回投诉','ok');render();
}
function viewAdminDevices(){
  const devs=DB.data.devices;
  return `
  <div class="page-head"><div><div class="crumb">ADMIN · 设备</div><h1>设备记录</h1></div></div>
  <div class="card mb"><p class="muted" style="font-size:14px">每台设备首次注册时记录。某设备累计被封禁 ≥ ${BAN_LIMIT} 次后，将无法在该设备上注册新账号。</p></div>
  <table class="tbl"><thead><tr><th>设备ID</th><th>设备信息</th><th>封禁次数</th><th>状态</th><th>首次出现</th><th>关联用户</th></tr></thead><tbody>
  ${devs.map(d=>{
    const us=DB.data.users.filter(u=>u.deviceId===d.id);
    return `<tr>
      <td style="font-family:'Silkscreen',monospace;font-size:11px">${d.id}</td>
      <td>${esc(d.label||'—')}</td>
      <td>${d.banCount} / ${BAN_LIMIT}</td>
      <td>${d.banCount>=BAN_LIMIT?'<span class="ban-flag">受限</span>':'<span class="pill done">正常</span>'}</td>
      <td style="font-size:12px;color:var(--ink-faint)">${fmtTime(d.firstSeen)}</td>
      <td>${us.map(u=>esc(u.username)+(u.banned?' <span class="ban-flag">封</span>':'')).join(', ')||'—'}</td>
    </tr>`;
  }).join('')}
  </tbody></table>`;
}
